<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Photo Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="Photo_Editor.css">

</head>

<body>


    <div class="header">
        <h1>Photo Editor</h1>
        <p>Customize and preview your photos with ease.</p>
        <button class="btn btn-secondary" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>


    <div class="container photo-container">
        <h2>Photos List</h2>

        <button class="btn btn-primary" onclick="loadPhotos()">Add Photo</button>
        <button class="btn btn-secondary" onclick="refreshPhotos()">Refresh Photos</button>

        <div class="photo-grid mt-3" id="photoGrid"></div>


        <div class="editor mt-4">
            <h4>Edit Photos</h4>

            <label>Add Text</label>
            <input type="text" id="textInput" class="form-control mb-2" placeholder="Enter text" />

            <label>Font Family</label>
            <select id="fontFamily" class="form-control mb-2">
                <option>Helvetica</option>
                <option>Times New Roman</option>
                <option>Arial</option>
                <option>Courier New</option>
            </select>

            <label>Font Size</label>
            <input type="number" id="fontSize" class="form-control mb-2" value="16" />

            <label>Emojis</label><br />
            <span class="emoji" onclick="selectEmoji('😀')">😀</span>
            <span class="emoji" onclick="selectEmoji('😂')">😂</span>
            <span class="emoji" onclick="selectEmoji('😍')">😍</span>
            <span class="emoji" onclick="selectEmoji('😎')">😎</span>

            <br /><br />

            <label>Background Color</label>
            <input type="color" id="bgColor" class="form-control mb-3" />

            <button class="btn btn-success" onclick="applyChanges()">Apply Changes</button>
            <button class="btn btn-danger" onclick="resetEditor()">Reset</button>
        </div>
    </div>

    <div class="modal fade" id="previewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Preview</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="previewContent"></div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <div class="footer">
        © 2024 Photo Editor. All rights reserved.
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="Photo_Editor.js"></script>

</body>

</html>
